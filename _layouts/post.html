<div id="post-nav">
  {% if page.previous %}
    <a class="prev-item" href="{{ page.previous.url | prepend: site.baseurl }}">
      &larr; Previous: {{ page.previous.title }}
    </a>
  {% else %}
    <span></span> <!-- Keeps 'Next' on the right if no 'Previous' exists -->
  {% endif %}

  {% if page.next %}
    <a class="next-item" href="{{ page.next.url | prepend: site.baseurl }}">
      Next: {{ page.next.title }} &rarr;
    </a>
  {% endif %}
</div>
