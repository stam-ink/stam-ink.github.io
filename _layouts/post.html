---
layout: default
---

<div class="post">
  <h1 class="post-title">{{ page.title }}</h1>
  <span class="post-date">{{ page.date | date_to_string }}</span>
  {{ content }}
</div>

<div class="post-navigation">
  <div class="nav-wrapper">
    {% if page.previous %}
      <a class="prev-link" href="{{ page.previous.url | prepend: site.baseurl }}">
        &larr; Previous: {{ page.previous.title }}
      </a>
    {% else %}
      <div></div> <!-- This empty div acts as a spacer -->
    {% endif %}

    {% if page.next %}
      <a class="next-link" href="{{ page.next.url | prepend: site.baseurl }}">
        Next: {{ page.next.title }} &rarr;
      </a>
    {% endif %}
  </div>
</div>
